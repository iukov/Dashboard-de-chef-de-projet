<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Projets</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 { margin-bottom: 20px; }

    .container { max-width: 1200px; margin: auto; }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    th { color: #94a3b8; }

    .ok { color: #22c55e; }
    .risque { color: #f59e0b; }
    .retard { color: #ef4444; }
  </style>
</head>

<body>

<div class="container">

<h1>📊 Dashboard Projets</h1>

<div id="loading">Chargement des données...</div>

<div class="grid">
  <div class="card"><canvas id="barChart"></canvas></div>
  <div class="card"><canvas id="pieChart"></canvas></div>
</div>

<div class="card">
<table id="table">
<thead>
<tr>
<th>Projet</th>
<th>Estimation</th>
<th>Temps réel</th>
<th>Écart</th>
<th>Marge</th>
<th>Deadline</th>
<th>Statut</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

const WEBHOOK_URL = "https://hook.eu2.make.com/iw04o4auv4sicpvs4hzduj5shja3axkn";

// --- Helpers

function parseNumber(value) {
  if (!value) return 0;

  const cleaned = String(value)
    .replace(/€/g, "")
    .replace(/,/g, "")
    .replace(/\s/g, "")
    .replace(/%/g, "");

  const num = Number(cleaned);
  return isNaN(num) ? 0 : num;
}

function getStatutClass(statut) {
  if (statut === "OK" || statut === "Terminé") return "ok";
  if (statut === "Risque") return "risque";
  if (statut === "Retard") return "retard";
  return "";
}

// --- MAIN

async function loadDashboard() {
  try {

    const response = await fetch(WEBHOOK_URL, { cache: "no-store" });

    // 🔴 Gestion erreur 429 (Make)
    if (response.status === 429) {
      throw new Error("Limite Make atteinte. Attends 1-2 minutes.");
    }

    if (!response.ok) {
      throw new Error("HTTP " + response.status);
    }

    const text = await response.text();
    console.log("Réponse brute :", text);

    const data = JSON.parse(text);

    if (!Array.isArray(data)) {
      throw new Error("Format invalide");
    }

    const projets = data.map(row => {

      return {
        projet: row.A || "Sans nom",
        estimation: parseNumber(row.B),
        temps: parseNumber(row.C),
        marge: parseNumber(row.H),
        deadline: row.I || "",
        statut: row.J || "OK"
      };

    }).map(p => {

      const ecart = p.estimation
        ? ((p.temps - p.estimation) / p.estimation) * 100
        : 0;

      return { ...p, ecart };

    });

    // --- TABLE

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    projets.forEach(p => {
      tbody.innerHTML += `
        <tr>
          <td>${p.projet}</td>
          <td>${p.estimation}h</td>
          <td>${p.temps}h</td>
          <td>${p.ecart.toFixed(1)}%</td>
          <td>${p.marge.toFixed(1)}%</td>
          <td>${p.deadline}</td>
          <td class="${getStatutClass(p.statut)}">${p.statut}</td>
        </tr>
      `;
    });

    // --- CHARTS

    const labels = projets.map(p => p.projet);

    const estimationData = projets.map(p => p.estimation);
    const tempsData = projets.map(p => p.temps);

    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Estimation', data: estimationData },
          { label: 'Temps réel', data: tempsData }
        ]
      }
    });

    const statusCount = {
      OK: projets.filter(p => p.statut === "OK" || p.statut === "Terminé").length,
      Risque: projets.filter(p => p.statut === "Risque").length,
      Retard: projets.filter(p => p.statut === "Retard").length
    };

    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: {
        labels: Object.keys(statusCount),
        datasets: [{
          data: Object.values(statusCount)
        }]
      }
    });

    document.getElementById("loading").textContent = "Données chargées";

  } catch (error) {

    console.error(error);

    document.getElementById("loading").textContent =
      "Erreur de chargement des données : " + error.message;
  }
}

loadDashboard();

</script>

</body>
</html>
