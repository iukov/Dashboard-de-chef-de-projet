<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Projets</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #081735;
      color: #fff;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin: 0 0 24px 0;
      font-size: 28px;
    }

    .container {
      max-width: 1280px;
      margin: auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card, .panel {
      background: #1c2b47;
      border-radius: 18px;
      padding: 20px;
    }

    .card .label {
      color: #b7c2d6;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .card .value {
      font-size: 24px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .panel h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 10px;
      border-bottom: 1px solid #334766;
      text-align: left;
    }

    th {
      color: #aab7cf;
      font-weight: 600;
    }

    .ok { color: #19d66b; font-weight: 700; }
    .risque { color: #f7b731; font-weight: 700; }
    .retard { color: #ff5c5c; font-weight: 700; }

    #loading {
      margin-bottom: 20px;
      color: #c9d4e7;
    }

    @media (max-width: 960px) {
      .cards, .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dashboard Projets</h1>
    <div id="loading">Chargement des données...</div>

    <div class="cards">
      <div class="card">
        <div class="label">Projets suivis</div>
        <div class="value" id="kpiTotal">0</div>
      </div>
      <div class="card">
        <div class="label">Marge moyenne</div>
        <div class="value" id="kpiMarge">0.0%</div>
      </div>
      <div class="card">
        <div class="label">Écart moyen</div>
        <div class="value" id="kpiEcart">0.0%</div>
      </div>
      <div class="card">
        <div class="label">Projets en alerte</div>
        <div class="value" id="kpiAlertes">0</div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Estimation vs temps réel</h2>
        <canvas id="barChart"></canvas>
      </div>
      <div class="panel">
        <h2>Répartition des statuts</h2>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <div class="panel">
      <h2>Suivi détaillé</h2>
      <table id="table">
        <thead>
          <tr>
            <th>Projet</th>
            <th>Estimation</th>
            <th>Temps réel</th>
            <th>Écart</th>
            <th>Marge</th>
            <th>Deadline</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

 <script>
  const WEBHOOK_URL = "https://hook.eu2.make.com/iw04o4auv4sicpvs4hzduj5shja3axkn";

  async function loadDashboard() {
    try {
      const response = await fetch(WEBHOOK_URL, { cache: "no-store" });

      const text = await response.text();

      document.getElementById("loading").innerHTML =
        "<pre style='white-space:pre-wrap;color:white;background:#111;padding:16px;border-radius:12px;overflow:auto;'>" +
        text.replace(/</g, "&lt;") +
        "</pre>";

      console.log("Réponse brute Make :", text);
    } catch (error) {
      document.getElementById("loading").textContent =
        "Erreur de chargement des données : " + error.message;
      console.error(error);
    }
  }

  loadDashboard();
</script>
</body>
</html>
